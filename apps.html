<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apps · [Company] Hub</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="topnav">
  <div class="brand"><span class="dot"></span>[Company] Hub</div>
  <div class="nav-links">
    <a href="/apps.html">Apps</a>
    <a href="/team.html">Team Photos</a>
    <a href="/admin.html">Admin</a>
  </div>
</nav>

<section class="hero" style="padding-bottom: 20px;">
  <span class="eyebrow">Directory</span>
  <h1>Apps &amp; tools</h1>
  <p>Everything the team has built or connected, kept in one directory instead of a dozen bookmarks.</p>
</section>

<div class="section" data-apps-section>
  <div class="search-row">
    <input type="search" id="appSearch" class="search-input" placeholder="Search apps..." autocomplete="off" />
  </div>

  <div class="recents-row" data-recents-row style="display: none;">
    <span class="recents-label">Recently opened</span>
  </div>

  <div class="section-head">
    <h2>All apps</h2>
  </div>
  <div class="grid" data-apps-grid>
    <div class="empty-state">Loading…</div>
  </div>
</div>

<div class="app-viewer" data-app-viewer>
  <div class="app-viewer-bar">
    <div class="app-viewer-bar-left">
      <button class="back-btn" data-back-btn>&larr; Back</button>
      <span class="app-viewer-title" data-viewer-title></span>
    </div>
    <a class="app-viewer-open" data-viewer-open href="#" target="_blank" rel="noopener">Open in new tab &#8599;</a>
  </div>
  <div class="app-viewer-frame-wrap">
    <iframe data-viewer-frame src="about:blank" title="App viewer" loading="lazy"></iframe>
  </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
