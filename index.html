<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>[Company] Hub</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="topnav">
  <div class="brand"><span class="dot"></span>[Company] Hub</div>
  <div class="nav-links">
    <a href="/apps.html">Apps</a>
    <a href="/team.html">Team Photos</a>
    <a href="/admin.html">Admin</a>
  </div>
</nav>

<section class="hero">
  <span class="eyebrow">Internal · v1</span>
  <h1>Everything the team needs, in one place.</h1>
  <p>A single home for the tools we use and the people who use them. Add an app, upload a photo, done — no code required.</p>
  <div class="hero-actions">
    <a class="btn btn-primary" href="/apps.html">Browse apps</a>
    <a class="btn btn-ghost" href="/admin.html">Open admin</a>
  </div>
</section>

<div class="status-strip">
  <div class="status-cell">
    <div class="status-label">Apps live</div>
    <div class="status-value" data-stat="apps">—</div>
    <div class="status-bar"><span></span></div>
  </div>
  <div class="status-cell">
    <div class="status-label">Team photos</div>
    <div class="status-value" data-stat="images">—</div>
    <div class="status-bar"><span></span></div>
  </div>
  <div class="status-cell">
    <div class="status-label">Status</div>
    <div class="status-value">Online</div>
    <div class="status-bar"><span style="width:100%"></span></div>
  </div>
</div>

<script src="/js/main.js"></script>
